<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#FF7AB6"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFF7E6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F4EFF7" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <rect width="128" height="128" rx="18" fill="#F4EFF7"/>

  <!-- soft halo -->
  <circle cx="64" cy="44" r="34" fill="url(#halo)" />

  <!-- main sun with gradient -->
  <circle cx="64" cy="44" r="20" fill="url(#g1)" stroke="#B76BFF" stroke-width="2" />

  <!-- inner sheen -->
  <ellipse cx="56" cy="36" rx="6" ry="4" fill="#FFFFFF" opacity="0.35" />

  <!-- orbit ring -->
  <ellipse cx="64" cy="64" rx="34" ry="18" fill="none" stroke="#D9C6FF" stroke-width="2" opacity="0.45" transform="rotate(-18 64 64)" />

  <!-- small sparkles -->
  <g fill="#FFD166" opacity="0.95">
    <circle cx="22" cy="26" r="3" />
    <circle cx="100" cy="34" r="2.4" />
    <circle cx="92" cy="86" r="2.6" />
    <circle cx="36" cy="96" r="2.2" />
  </g>

  <!-- accent dots along orbit -->
  <g fill="#7C4DFF" opacity="0.85">
    <circle cx="36" cy="60" r="2" />
    <circle cx="86" cy="40" r="1.8" />
    <circle cx="52" cy="78" r="1.6" />
  </g>

</svg>
