name: frontend_aura
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🌐 For backend API calls
  http: ^1.2.0

  # 💾 For saving user session/token locally
  shared_preferences: ^2.2.2

  # 🕒 For date/time formatting (used in new home_screen.dart)
  intl: ^0.19.0

  # 🔐 For encryption (used by journal and export features)
  encrypt: ^5.0.3

  # 📂 For saving/exporting journal entries to files
  path_provider: ^2.1.2

  # 🆔 For generating unique IDs for journal entries
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
